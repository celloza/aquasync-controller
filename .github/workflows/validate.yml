name: Validate ESPHome Config

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install ESPHome
        run: pip install esphome
        
      - name: Validate ESPHome Config
        run: esphome config aquasync_controller.yaml
